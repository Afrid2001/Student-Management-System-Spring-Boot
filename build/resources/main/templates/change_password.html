<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Center - SMS HUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="wrapper">
    <nav id="sidebar">
        <div class="sidebar-header d-flex align-items-center">
            <i class="fa-solid fa-graduation-cap fa-xl text-info me-2"></i>
            <h4 class="text-white m-0 fw-bold">SMS <span style="color: var(--accent-cyan);">HUB</span></h4>
        </div>
        <ul class="list-unstyled components">
            <li><a th:href="@{/students}"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a th:href="@{/students/new}"><i class="fa-solid fa-user-plus"></i> Add Student</a></li>
            <li><a th:href="@{/students}"><i class="fa-solid fa-users-viewfinder"></i> View Records</a></li>
            <li class="active"><a th:href="@{/change-password}"><i class="fa-solid fa-shield-halved"></i> Security settings</a></li>
            <li class="mt-5"><a th:href="@{/logout}" class="text-danger"><i class="fa-solid fa-power-off text-danger"></i> Sign Out</a></li>
        </ul>
    </nav>

    <div id="content">
        <div class="container-fluid py-2">
            <div class="mb-4">
                <a th:href="@{/students}" class="text-decoration-none small text-info">
                    <i class="fa-solid fa-circle-arrow-left me-1"></i> Return back to Workspace Matrix Index View Dashboard Hub
                </a>
            </div>

            <div class="row justify-content-center">
                <div class="col-xl-6 col-lg-8">
                    <div class="card glass-card p-4 p-md-5">

                        <div class="text-center mb-4 pb-3 border-bottom border-secondary">
                            <div class="bg-info bg-opacity-10 p-3 rounded-circle d-inline-block text-info mb-3">
                                <i class="fa-solid fa-user-shield fa-2x"></i>
                            </div>
                            <h3 class="text-white fw-semibold m-0">Cryptographic Identity Keys Refactoring</h3>
                            <p style="color: var(--text-muted);" class="m-0 small mt-1">Alter current system passwords tokens layers to preserve internal security audit vectors matrix integrity.</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger bg-danger bg-opacity-20 text-danger border-0 small mb-4">
                            <i class="fa-solid fa-triangle-exclamation me-2"></i> <span th:text="${error}"></span>
                        </div>
                        <div th:if="${success}" class="alert alert-success bg-success bg-opacity-20 text-success border-0 small mb-4">
                            <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}"></span>
                        </div>

                        <form th:action="@{/change-password}" method="post">
                            <div class="mb-3">
                                <label class="form-label text-light small fw-medium">Current Operational Key Passphrase Token</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fa-solid fa-key"></i></span>
                                    <input type="password" name="oldPassword" class="form-control" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-light small fw-medium">Target Generation New Passphrase Token Matrix Element Input</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fa-solid fa-lock-open"></i></span>
                                    <input type="password" name="newPassword" class="form-control" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-light small fw-medium">Verify Allocation Matching Passphrase Token Identity Match Confirmation</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-secondary text-muted"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" name="confirmPassword" class="form-control" placeholder="••••••••" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-premium-primary w-100 py-2.5">
                                <i class="fa-solid fa-rotate me-1"></i> Overwrite Active Cryptographic Passwords Matrix Key System Arrays
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
