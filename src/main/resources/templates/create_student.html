<!DOCTYPE html>
<html xmlns:th="http://www.thymeLeaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Create Student - Student Management System</title>
	<link rel="stylesheet"
	      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
	      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	      crossorigin="anonymous">
	<link rel="stylesheet"
	      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" type="text/css" href="style.css">
	<style>
		.form-container {
			max-width: 600px;
			margin: 3rem auto;
		}
		.photo-preview {
			width: 150px;
			height: 150px;
			border-radius: 12px;
			background: linear-gradient(135deg, #5B21B6, #8B5CF6);
			display: flex;
			align-items: center;
			justify-content: center;
			color: white;
			font-size: 3rem;
			margin-bottom: 1.5rem;
			border: 3px solid var(--secondary-color);
		}
		.form-section {
			margin-bottom: 2rem;
		}
		.form-section-title {
			font-size: 0.9rem;
			text-transform: uppercase;
			letter-spacing: 1px;
			color: var(--text-secondary);
			margin-bottom: 1.5rem;
			padding-bottom: 1rem;
			border-bottom: 2px solid var(--border-color);
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}
		.input-group-icon {
			position: relative;
		}
		.input-group-icon i {
			position: absolute;
			left: 12px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--secondary-color);
			pointer-events: none;
		}
		.input-group-icon input {
			padding-left: 2.5rem !important;
		}
	</style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-md">
	<a class="navbar-brand" href="#">
		<i class="fas fa-graduation-cap"></i> StudentHub
	</a>

	<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
		<span class="navbar-toggler-icon"></span>
	</button>

	<div class="collapse navbar-collapse" id="collapsibleNavbar">
		<ul class="navbar-nav">
			<li class="nav-item">
				<a class="nav-link" th:href="@{/students}">
					<i class="fas fa-arrow-left"></i> Back to Students
				</a>
			</li>
		</ul>
	</div>
</nav>

<div class="form-container animate-fade-in">
	<div class="card">
		<div class="card-header">
			<h3 style="margin: 0; display: flex; align-items: center; gap: 0.75rem;">
				<i class="fas fa-user-plus"></i> Create New Student
			</h3>
		</div>

		<div class="card-body">
			<form th:action="@{/students}"
			      th:object="${student}"
			      method="POST"
			      enctype="multipart/form-data">

				<!-- Personal Information Section -->
				<div class="form-section">
					<div class="form-section-title">
						<i class="fas fa-user-circle"></i> Personal Information
					</div>

					<div class="form-group">
						<label for="firstName" class="form-label">
							<i class="fas fa-user"></i> First Name <span style="color: var(--danger-color);">*</span>
						</label>
						<div class="input-group-icon">
							<i class="fas fa-user-check"></i>
							<input
									type="text"
									id="firstName"
									name="firstName"
									th:field="*{firstName}"
									class="form-control"
									placeholder="Enter first name"
									required>
						</div>
					</div>

					<div class="form-group">
						<label for="lastName" class="form-label">
							<i class="fas fa-user"></i> Last Name <span style="color: var(--danger-color);">*</span>
						</label>
						<div class="input-group-icon">
							<i class="fas fa-user-check"></i>
							<input
									type="text"
									id="lastName"
									name="lastName"
									th:field="*{lastName}"
									class="form-control"
									placeholder="Enter last name"
									required>
						</div>
					</div>
				</div>

				<!-- Contact Information Section -->
				<div class="form-section">
					<div class="form-section-title">
						<i class="fas fa-envelope"></i> Contact Information
					</div>

					<div class="form-group">
						<label for="email" class="form-label">
							<i class="fas fa-envelope"></i> Email Address <span style="color: var(--danger-color);">*</span>
						</label>
						<div class="input-group-icon">
							<i class="fas fa-at"></i>
							<input
									type="email"
									id="email"
									name="email"
									th:field="*{email}"
									class="form-control"
									placeholder="Enter email address"
									required>
						</div>
					</div>
				</div>

				<!-- Education Section -->
				<div class="form-section">
					<div class="form-section-title">
						<i class="fas fa-graduation-cap"></i> Education
					</div>

					<div class="form-group">
						<label for="collegeName" class="form-label">
							<i class="fas fa-building"></i> College Name <span style="color: var(--danger-color);">*</span>
						</label>
						<div class="input-group-icon">
							<i class="fas fa-school"></i>
							<input
									type="text"
									id="collegeName"
									name="collegeName"
									th:field="*{collegeName}"
									class="form-control"
									placeholder="Enter college name"
									required>
						</div>
					</div>
				</div>

				<!-- Profile Photo Section -->
				<div class="form-section">
					<div class="form-section-title">
						<i class="fas fa-image"></i> Profile Photo
					</div>

					<div style="text-align: center; margin-bottom: 1.5rem;">
						<div class="photo-preview">
							<i class="fas fa-camera"></i>
						</div>
						<p style="color: var(--text-secondary); font-size: 0.9rem; margin: 0;">
							Upload a square photo (JPG, PNG)
						</p>
					</div>

					<div class="form-group">
						<label for="photoFile" class="form-label">
							<i class="fas fa-upload"></i> Choose Photo
						</label>
						<input
								type="file"
								id="photoFile"
								name="photoFile"
								class="form-control"
								accept="image/*"
								onchange="previewImage(event)">
						<small style="color: var(--text-secondary);">
							Accepted formats: JPG, PNG, GIF (Max 5MB)
						</small>
					</div>
				</div>

				<!-- Action Buttons -->
				<div class="form-section" style="margin-bottom: 0; border: none;">
					<div style="display: flex; gap: 1rem; justify-content: flex-end;">
						<a th:href="@{/students}" class="btn btn-secondary">
							<i class="fas fa-times-circle"></i> Cancel
						</a>
						<button type="submit" class="btn btn-primary btn-lg">
							<i class="fas fa-save"></i> Create Student
						</button>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>

<!-- Bootstrap & Scripts -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

<script>
	function previewImage(event) {
		const file = event.target.files[0];
		const preview = document.querySelector('.photo-preview');

		if (file) {
			const reader = new FileReader();
			reader.onload = function(e) {
				preview.innerHTML = '';
				const img = document.createElement('img');
				img.src = e.target.result;
				img.style.width = '100%';
				img.style.height = '100%';
				img.style.objectFit = 'cover';
				img.style.borderRadius = '12px';
				preview.appendChild(img);
			};
			reader.readAsDataURL(file);
		}
	}

	// Form validation
	document.querySelector('form').addEventListener('submit', function(e) {
		const firstName = document.getElementById('firstName').value.trim();
		const lastName = document.getElementById('lastName').value.trim();
		const email = document.getElementById('email').value.trim();
		const collegeName = document.getElementById('collegeName').value.trim();

		if (!firstName || !lastName || !email || !collegeName) {
			e.preventDefault();
			alert('Please fill in all required fields');
			return false;
		}

		const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
		if (!emailRegex.test(email)) {
			e.preventDefault();
			alert('Please enter a valid email address');
			return false;
		}
	});
</script>

</body>
</html>
