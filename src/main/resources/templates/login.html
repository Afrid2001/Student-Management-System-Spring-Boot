<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 1rem;
        }

        .login-card {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background-color: var(--card-bg);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #5B21B6 0%, #8B5CF6 100%);
            padding: 3rem 2rem;
            text-align: center;
            color: white;
        }

        .login-header-logo {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.5px;
        }

        .login-header p {
            margin: 0;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .login-body {
            padding: 3rem 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--secondary-color);
            pointer-events: none;
        }

        .form-control {
            padding-left: 2.75rem !important;
            height: 48px;
            border-radius: 8px;
            background-color: var(--input-bg) !important;
            border: 1.5px solid var(--border-color) !important;
            color: var(--text-primary) !important;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: var(--input-bg) !important;
            border-color: var(--secondary-color) !important;
            box-shadow: 0 0 0 4px rgba(91, 33, 182, 0.1) !important;
            color: var(--text-primary) !important;
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .btn-login {
            width: 100%;
            height: 48px;
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(91, 33, 182, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .security-info {
            background: linear-gradient(135deg, rgba(5, 150, 105, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
            border: 1px solid rgba(5, 150, 105, 0.2);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .security-info i {
            color: #10B981;
            flex-shrink: 0;
            margin-top: 0.25rem;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .login-header {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .login-body {
                padding: 2rem 1.5rem;
            }

            .form-control {
                height: 44px;
                font-size: 14px;
            }

            .btn-login {
                height: 44px;
                font-size: 14px;
            }
        }

        /* Animation for form submission */
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <!-- Header -->
        <div class="login-header">
            <div class="login-header-logo">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>StudentHub</h1>
            <p>Student Management System</p>
        </div>

        <!-- Login Form -->
        <div class="login-body">
            <form action="/login" method="post" id="loginForm">
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user-circle"></i> Username
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input
                                type="text"
                                id="username"
                                name="username"
                                class="form-control"
                                placeholder="Enter your username"
                                required
                                autofocus>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter your password"
                                required>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="display: flex; align-items: center; font-weight: 400; margin-bottom: 0;">
                        <input type="checkbox" name="remember" style="margin-right: 0.5rem; cursor: pointer;">
                        Remember me
                    </label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-login" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>

                <!-- Security Info -->
                <div class="security-info">
                    <i class="fas fa-shield-alt"></i>
                    <div>
                        <strong>Secure Login:</strong> Your credentials are encrypted and transmitted securely.
                    </div>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer" style="margin-top: 2rem;">
                <p style="margin: 0;">
                    <i class="fas fa-info-circle"></i>
                    Need help? Contact your administrator
                </p>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap & Scripts -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const submitBtn = document.getElementById('submitBtn');

        if (!username || !password) {
            e.preventDefault();
            alert('Please enter both username and password');
            return false;
        }

        // Show loading state
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    });

    // Add keyboard shortcuts
    document.getElementById('username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('password').focus();
        }
    });

    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').submit();
        }
    });

    // Password visibility toggle (optional)
    const passwordInput = document.getElementById('password');
    const togglePassword = () => {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
        } else {
            passwordInput.type = 'password';
        }
    };
</script>

</body>
</html>
