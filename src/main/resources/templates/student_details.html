<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details - Student Management System</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        .detail-container {
            max-width: 700px;
            margin: 3rem auto;
        }
        .photo-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        .photo-section img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            border: 4px solid var(--secondary-color);
            box-shadow: 0 10px 40px rgba(91, 33, 182, 0.2);
        }
        .photo-placeholder {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #5B21B6, #8B5CF6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4rem;
            margin: 0 auto;
            border: 4px solid var(--secondary-color);
            box-shadow: 0 10px 40px rgba(91, 33, 182, 0.2);
        }
        .detail-row {
            display: flex;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            flex: 0 0 35%;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .detail-value {
            flex: 1;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
        }
        .action-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border-color);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .status-badge {
            display: inline-block;
            background: linear-gradient(135deg, #059669, #10B981);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
        .info-card-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .info-card-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .breadcrumb-nav {
            margin-bottom: 2rem;
        }
        .breadcrumb-nav a {
            color: var(--secondary-color);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .breadcrumb-nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-md">
    <a class="navbar-brand" href="#">
        <i class="fas fa-graduation-cap"></i> StudentHub
    </a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/students}">
                    <i class="fas fa-arrow-left"></i> Back to Students
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="detail-container">
    <!-- Breadcrumb -->
    <div class="breadcrumb-nav animate-fade-in">
        <a th:href="@{/students}">
            <i class="fas fa-home"></i> Dashboard
        </a>
        <span style="color: var(--text-secondary); margin: 0 0.5rem;">
            <i class="fas fa-chevron-right"></i>
        </span>
        <span style="color: var(--text-primary);">
            <i class="fas fa-user"></i> Student Details
        </span>
    </div>

    <!-- Main Card -->
    <div class="card animate-slide-up">
        <!-- Header -->
        <div class="card-header">
            <h3 style="margin: 0; display: flex; align-items: center; gap: 0.75rem;">
                <i class="fas fa-user-circle"></i> Student Information
            </h3>
        </div>

        <!-- Body -->
        <div class="card-body">
            <!-- Photo Section -->
            <div class="photo-section">
                <div th:if="${student.photo != null}">
                    <img th:src="@{'/uploads/' + ${student.photo}}"
                         alt="Student photo">
                </div>
                <div th:unless="${student.photo != null}" class="photo-placeholder">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div class="status-badge">
                    <i class="fas fa-check-circle"></i> Active Student
                </div>
            </div>

            <!-- Divider -->
            <hr style="border-color: var(--border-color); margin: 2rem 0;">

            <!-- Details -->
            <div style="margin-bottom: 2rem;">
                <!-- Full Name -->
                <div class="detail-row">
                    <div class="detail-label">
                        <i class="fas fa-user-tag"></i> Full Name
                    </div>
                    <div class="detail-value">
                        <span th:text="${student.firstName}"></span>
                        <span th:text="${student.lastName}"></span>
                    </div>
                </div>

                <!-- First Name -->
                <div class="detail-row">
                    <div class="detail-label">
                        <i class="fas fa-user-check"></i> First Name
                    </div>
                    <div class="detail-value" th:text="${student.firstName}"></div>
                </div>

                <!-- Last Name -->
                <div class="detail-row">
                    <div class="detail-label">
                        <i class="fas fa-user-check"></i> Last Name
                    </div>
                    <div class="detail-value" th:text="${student.lastName}"></div>
                </div>

                <!-- Email -->
                <div class="detail-row">
                    <div class="detail-label">
                        <i class="fas fa-envelope"></i> Email
                    </div>
                    <div class="detail-value">
                        <a th:href="'mailto:' + ${student.email}" style="color: #A78BFA; text-decoration: none;">
                            <i class="fas fa-external-link-alt"></i> <span th:text="${student.email}"></span>
                        </a>
                    </div>
                </div>

                <!-- College -->
                <div class="detail-row">
                    <div class="detail-label">
                        <i class="fas fa-building"></i> College
                    </div>
                    <div class="detail-value">
                        <span class="badge badge-primary" style="font-size: 0.95rem; padding: 0.5rem 1rem;">
                            <i class="fas fa-school"></i> <span th:text="${student.collegeName}"></span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Action Section -->
            <div class="action-section">
                <a th:href="@{/students}"
                   class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>

                <a th:href="@{/students/edit/{id}(id=${student.id})}"
                   class="btn btn-primary">
                    <i class="fas fa-edit"></i> Edit Information
                </a>

                <a th:href="@{/students/pdf/{id}(id=${student.id})}"
                   class="btn btn-success">
                    <i class="fas fa-file-pdf"></i> Download PDF
                </a>

                <a th:href="@{/students/{id}(id=${student.id})}"
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this student? This action cannot be undone.');">
                    <i class="fas fa-trash-alt"></i> Delete
                </a>
            </div>
        </div>
    </div>

    <!-- Footer Info -->
    <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
        <i class="fas fa-info-circle"></i>
        For more information or to make changes, use the Edit button above.
    </div>
</div>

<!-- Bootstrap & Scripts -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
